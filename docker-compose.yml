# Podman Compose Configuration
# Usage: podman-compose up -d
# Or with podman directly: podman play kube docker-compose.yml

services:
  # Mission Control Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mission-control-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CPU_THRESHOLD=${CPU_THRESHOLD:-80}
      - MEMORY_THRESHOLD=${MEMORY_THRESHOLD:-80}
      - DISK_THRESHOLD=${DISK_THRESHOLD:-90}
      - BACKUP_DIR=/app/backups
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 0 * * *}
      - UPDATE_SCHEDULE=${UPDATE_SCHEDULE:-0 3 * * *}
      - OPENCLAW_API_TIMEOUT=${OPENCLAW_API_TIMEOUT:-5000}
      # Auth settings
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-changeme}
      # Gateway host: use host.containers.internal for Podman to reach host
      - OPENCLAW_GATEWAY_HOST=${OPENCLAW_GATEWAY_HOST:-host.containers.internal}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      # Notifications
      - NOTIFICATIONS_ENABLED=${NOTIFICATIONS_ENABLED:-true}
      - DISCORD_USER_ID=${DISCORD_USER_ID:-}
      - NOTIFY_ON_COMPLETE=${NOTIFY_ON_COMPLETE:-true}
      - NOTIFY_ON_FAILED=${NOTIFY_ON_FAILED:-true}
      # Data persistence
      - DATA_DIR=/app/data
    volumes:
      - mission-control-backups:/app/backups
      - mission-control-logs:/app/logs
      - mission-control-data:/app/data
      # Mount frontend build for static file serving
      - ${PWD}/frontend/build:/app/frontend/build:ro
      # Mount OpenClaw config for status commands
      - ${HOME}/.openclaw:/root/.openclaw:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mission-control-network

  # Mission Control Frontend (optional, for production builds)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mission-control-frontend
    ports:
      - "3000:80"
    environment:
      # API_URL is injected at runtime by docker-entrypoint.sh
      # Set this to the externally accessible backend URL (e.g., https://api.example.com)
      - API_URL=${API_URL:-http://localhost:3001}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mission-control-network
    profiles:
      - full

volumes:
  mission-control-backups:
  mission-control-logs:
  mission-control-data:

networks:
  mission-control-network:
    driver: bridge